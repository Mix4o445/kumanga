# Nginx reverse proxy for the Next.js app.
# Install to: /etc/nginx/sites-available/manga  then symlink to sites-enabled.
# Replace YOUR_DOMAIN with your domain (or the server's public IP for testing).

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Allow large manga page image uploads.
    client_max_body_size 50M;

    # Serve uploaded images and static files directly from disk (fast, skips Node).
    location /uploads/ {
        alias /var/www/manga/public/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /_next/static/ {
        alias /var/www/manga/.next/static/;
        access_log off;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else goes to the Next.js server.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
